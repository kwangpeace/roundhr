name: Recruitment Slack recommendations

on:
  schedule:
    # 월~금 09:50 KST = 00:50 UTC (한국은 일광절약 없음)
    - cron: "50 0 * * 1-5"
  workflow_dispatch:

concurrency:
  group: recruitment-recommend
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automations/recruitment_slack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automations/recruitment_slack/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write candidates JSON from secret
        env:
          CANDIDATES_JSON: ${{ secrets.CANDIDATES_JSON }}
        run: |
          if [ -z "$CANDIDATES_JSON" ]; then
            echo "CANDIDATES_JSON secret is empty; using sample data for dry run."
            cp examples/sample_candidates.json /tmp/candidates.json
          else
            echo "$CANDIDATES_JSON" > /tmp/candidates.json
          fi

      - name: Run pipeline
        env:
          INPUT_JSON_PATH: /tmp/candidates.json
          APPLIED_TIME_FILTER: "true"
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GEMINI_FALLBACK_MODELS: ${{ vars.GEMINI_FALLBACK_MODELS }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MASK_CANDIDATE_NAMES: ${{ vars.MASK_CANDIDATE_NAMES }}
        run: |
          if [ -z "${LLM_API_KEY:-}" ] && [ -z "${GEMINI_API_KEY:-}" ] && [ -z "${OPENAI_API_KEY:-}" ]; then
            export MOCK_LLM=true
          fi
          python -m src.main
